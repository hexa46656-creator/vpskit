<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>VPSKit Login</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 80px auto; color: #111; }
    input, button { box-sizing: border-box; width: 100%; padding: 12px; margin: 8px 0; }
    button { cursor: pointer; background: #111; color: white; border: 0; }
  </style>
</head>
<body>
  <h1>VPSKit Login</h1>
  <form method="post" action="/login">
    <input name="user_id" placeholder="User ID" required>
    <input name="token" placeholder="Access token" required>
    <button type="submit">Login</button>
  </form>
</body>
</html>
