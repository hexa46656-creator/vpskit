<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>VPSKit Pricing</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="nav"><a class="brand" href="/">VPSKit</a><nav><a href="/docs.html">Docs</a></nav></header>
  <main>
    <section class="page-head"><h1>Pricing</h1><p>Choose a plan and provision access automatically after payment.</p></section>
    <section class="pricing">
      <article>
        <h2>Basic</h2>
        <p class="price">$9</p>
        <a id="paypal-basic" class="button pay-button" href="https://alexhexa.com/api/checkout/paypal?plan=basic">PayPal checkout</a>
      </article>
      <article>
        <h2>Pro</h2>
        <p class="price">$19</p>
        <a id="paypal-pro" class="button pay-button" href="https://alexhexa.com/api/checkout/paypal?plan=pro">PayPal checkout</a>
      </article>
      <article>
        <h2>Elite</h2>
        <p class="price">$49</p>
        <a id="paypal-elite" class="button pay-button" href="https://alexhexa.com/api/checkout/paypal?plan=elite">PayPal checkout</a>
      </article>
    </section>
    <p class="hint" id="paypal-hint">On mobile, the browser may hand off to the PayPal app if it is installed.</p>
  </main>
  <script>
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent || '');
    if (isMobile) {
      document.querySelectorAll('.pay-button').forEach((button) => {
        button.textContent = 'Open PayPal App';
      });
    }
  </script>
</body>
</html>
