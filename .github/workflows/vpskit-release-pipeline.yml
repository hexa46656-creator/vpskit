name: VPSKit Release Pipeline v2

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Simulated release version"
        required: true
        default: vpskit-release-simulated
      approve_execution:
        description: "Manual approval gate"
        required: true
        default: false
        type: boolean

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Generate manifest
        run: bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
      - name: Generate manifest lock
        run: bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
      - name: Verify manifest lock
        run: bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Dependency graph validation
        run: bash scripts/ci/dependency-analyzer.sh
      - name: Cross-repo overlap detection
        run: bash scripts/ci/overlap-detector.sh

  release-matrix:
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        repo:
          - vpskit-core
          - vpskit-installers
          - vpskit-contracts
          - vpskit-ui
          - vpskit-landing
          - vpskit-saas
          - vpskit-tools
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Generate manifest
        run: bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
      - name: Generate manifest lock
        run: bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
      - name: Verify manifest lock
        run: bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Dry-run split simulation
        run: bash scripts/ci/dry-run-split.sh --repo "${{ matrix.repo }}" --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Release plan generation
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: bash scripts/ci/release-plan-generator.sh --repo "${{ matrix.repo }}" --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock" --version "${RELEASE_VERSION}"
      - name: Simulated release actions
        env:
          RELEASE_VERSION: ${{ inputs.release_version }}
        run: |
          echo "PLANNED ACTION: create GitHub repository for ${{ matrix.repo }}"
          echo "PLANNED ACTION: push frozen history from vpskit-pre-split-freeze"
          echo "PLANNED ACTION: tag ${RELEASE_VERSION}-${{ matrix.repo }}"
          echo "No real GitHub operation is executed."

  approval-gate:
    runs-on: ubuntu-latest
    needs: release-matrix
    environment:
      name: split-approval
    steps:
      - name: Manual approval marker
        run: echo "READY FOR MANUAL APPROVAL"

  apply-stage:
    runs-on: ubuntu-latest
    needs: approval-gate
    if: ${{ inputs.approve_execution }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Re-validate manifest lock
        run: |
          bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
          bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
          bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Simulated apply placeholder
        run: |
          echo "THIS PIPELINE SIMULATES RELEASE ONLY"
          echo "No repo creation, push, tagging, or deployment occurs."
