name: VPSKit Split Matrix v2

on:
  workflow_dispatch:

jobs:
  matrix-split:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        repo:
          - vpskit-core
          - vpskit-installers
          - vpskit-contracts
          - vpskit-ui
          - vpskit-landing
          - vpskit-saas
          - vpskit-tools
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Generate manifest
        run: bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
      - name: Generate manifest lock
        run: bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
      - name: Verify manifest lock
        run: bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Dependency graph validation
        run: bash scripts/ci/dependency-analyzer.sh
      - name: Cross-repo overlap detection
        run: bash scripts/ci/overlap-detector.sh
      - name: Dry-run split simulation
        run: bash scripts/ci/dry-run-split.sh --repo "${{ matrix.repo }}" --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Isolated repo report
        run: |
          echo "ISOLATED JOB: ${{ matrix.repo }}"
          echo "Each matrix entry is read-only and independent."

  approval-gate:
    runs-on: ubuntu-latest
    needs: matrix-split
    environment:
      name: split-approval
    steps:
      - name: Manual approval marker
        run: echo "READY FOR MANUAL APPROVAL"

