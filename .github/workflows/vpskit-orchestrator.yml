name: VPSKit Orchestrator v2

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Dry run or apply placeholder"
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - apply
      approve_execution:
        description: "Manual approval gate"
        required: true
        default: false
        type: boolean

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Generate manifest
        run: bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
      - name: Generate manifest lock
        run: bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
      - name: Verify manifest lock
        run: bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Dependency graph validation
        run: bash scripts/ci/dependency-analyzer.sh
      - name: Cross-repo overlap detection
        run: bash scripts/ci/overlap-detector.sh

  split-matrix:
    runs-on: ubuntu-latest
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        repo:
          - vpskit-core
          - vpskit-installers
          - vpskit-contracts
          - vpskit-ui
          - vpskit-landing
          - vpskit-saas
          - vpskit-tools
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Generate manifest
        run: bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
      - name: Generate manifest lock
        run: bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
      - name: Verify manifest lock
        run: bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Dependency graph validation
        run: bash scripts/ci/dependency-analyzer.sh
      - name: Cross-repo overlap detection
        run: bash scripts/ci/overlap-detector.sh
      - name: Dry-run split simulation
        run: bash scripts/ci/dry-run-split.sh --repo "${{ matrix.repo }}" --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Isolated split report
        run: echo "ISOLATED MATRIX REPORT READY for ${{ matrix.repo }}"

  approval-gate:
    runs-on: ubuntu-latest
    needs: split-matrix
    environment:
      name: split-approval
    steps:
      - name: Manual approval marker
        run: echo "READY FOR MANUAL APPROVAL"

  apply-stage:
    runs-on: ubuntu-latest
    needs: approval-gate
    if: ${{ inputs.approve_execution && inputs.mode == 'apply' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Freeze validation
        run: bash scripts/ci/freeze-check.sh
      - name: Generate manifest
        run: bash scripts/ci/generate-manifest.sh > "$RUNNER_TEMP/manifest.json"
      - name: Generate manifest lock
        run: bash scripts/ci/manifest-lock.sh generate --manifest "$RUNNER_TEMP/manifest.json" > "$RUNNER_TEMP/manifest.lock"
      - name: Verify manifest lock
        run: bash scripts/ci/manifest-lock.sh verify --manifest "$RUNNER_TEMP/manifest.json" --lock "$RUNNER_TEMP/manifest.lock"
      - name: Planned apply placeholder
        run: |
          echo "APPLY STAGE IS SIMULATED ONLY"
          echo "No git filter-repo, GitHub repo creation, push, or deployment is executed."
